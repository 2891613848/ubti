<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBTI · 大学适配类型测试</title>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"PingFang SC","Noto Sans SC","Microsoft YaHei",-apple-system,sans-serif;
  background:#F4F2F0;color:#2D3436;min-height:100vh;line-height:1.7;
}

/* ===== INTRO ===== */
#intro-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;position:relative;z-index:1}
.intro-card{background:#fff;border-radius:24px;padding:56px 48px;max-width:580px;width:100%;text-align:center;box-shadow:0 2px 20px rgba(0,0,0,.07);position:relative;overflow:hidden}
.intro-accent{position:absolute;top:0;left:0;right:0;height:4px;background:#6C5CE7}
.intro-logo{font-size:52px;font-weight:900;letter-spacing:8px;margin-bottom:4px;color:#1E1E2E}
.intro-subtitle{font-size:13px;color:#999;font-weight:500;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
.intro-divider{width:40px;height:2px;background:#D0CCC8;margin:0 auto 24px}
.intro-lead{font-size:20px;font-weight:700;color:#1E1E2E;margin-bottom:8px}
.intro-lead .hl{color:#6C5CE7}
.intro-explainer{font-size:14px;color:#888;line-height:1.8;margin-bottom:32px}

/* 四维度预览 */
.intro-dim-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:32px;text-align:left}
.intro-dim-item{background:#FAFAF8;border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:4px}
.intro-dim-icon{font-size:20px}
.intro-dim-name{font-size:13px;font-weight:700;color:#1E1E2E}
.intro-dim-range{font-size:11px;color:#999}

/* 三步说明 */
.intro-steps{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px;flex-wrap:wrap}
.intro-step{display:flex;align-items:center;gap:8px;font-size:13px;color:#666;font-weight:600}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#6C5CE7;color:#fff;font-size:12px;font-weight:800;flex-shrink:0}
.intro-step-arrow{color:#ccc;font-size:16px;font-weight:300}

/* 底部信息 */
.intro-meta{display:flex;justify-content:center;gap:16px;margin-bottom:32px;font-size:13px;color:#999}
.intro-meta span{display:flex;align-items:center;gap:5px}
.btn-start{display:inline-block;padding:16px 72px;font-size:17px;font-weight:700;color:#fff;background:#6C5CE7;border:none;border-radius:50px;cursor:pointer;transition:background .2s;letter-spacing:2px}
.btn-start:hover{background:#5B4BD5}
.btn-start:active{background:#4A3CC4}

/* ===== QUIZ ===== */
#quiz-screen{display:none;max-width:640px;margin:0 auto;padding:24px;position:relative;z-index:1}
.progress-wrap{margin-bottom:24px}
.progress-bar{width:100%;height:8px;background:#E0DED8;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:#6C5CE7;transition:width .35s ease}
.progress-text{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:13px;color:#888;font-weight:600}
.progress-dots{display:flex;gap:5px}
.progress-dots span{width:8px;height:8px;border-radius:50%;background:#D4D0E8;transition:background .3s}
.progress-dots span.done{background:#888}

.question-card{background:#fff;border-radius:20px;padding:40px 36px;box-shadow:0 2px 16px rgba(0,0,0,.06);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.question-dim-chip{display:inline-block;padding:4px 12px;border-radius:16px;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:16px;color:#fff;background:#6C5CE7}

.question-text{font-size:19px;font-weight:700;color:#1E1E2E;margin-bottom:28px;line-height:1.6}

/* spectrum scale */
.scale-wrap{display:flex;flex-direction:column;gap:20px}
.scale-labels{display:flex;justify-content:space-between;font-size:13px;color:#888;font-weight:600;padding:0 4px}
.scale-labels span{max-width:42%;line-height:1.5}
.scale-spectrum{display:flex;align-items:center;justify-content:space-between;position:relative;padding:8px 4px}
.scale-btn{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:8px;background:none;border:none;cursor:pointer;padding:6px 2px;transition:transform .15s}
.scale-btn:hover{transform:translateY(-2px)}
.scale-dot{width:28px;height:28px;border-radius:50%;background:#fff;border:3px solid #D0CCC8;transition:all .2s}
.scale-btn:hover .scale-dot{border-color:#6C5CE7}
.scale-btn.sel .scale-dot{background:#6C5CE7;border-color:#6C5CE7}
.scale-slabel{font-size:11px;color:#aaa;font-weight:600;white-space:nowrap;transition:color .2s}
.scale-btn.sel .scale-slabel{color:#6C5CE7;font-weight:700}

/* back button */
.back-row{display:flex;justify-content:space-between;align-items:center;margin-top:28px}
.btn-back{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;font-size:14px;font-weight:600;color:#999;background:transparent;border:1.5px solid #E0DED8;border-radius:24px;cursor:pointer;transition:all .2s}
.btn-back:hover{color:#6C5CE7;border-color:#6C5CE7;background:#F8F7FF}
.btn-back:disabled{opacity:.3;cursor:default;pointer-events:none}
.btn-skip{display:inline-flex;align-items:center;gap:4px;padding:10px 20px;font-size:13px;font-weight:600;color:#ccc;background:transparent;border:none;cursor:pointer;transition:color .2s}
.btn-skip:hover{color:#999}

/* ===== RESULTS ===== */
#results-screen{display:none;max-width:680px;margin:0 auto;padding:24px;position:relative;z-index:1}
.results-hero{text-align:center;margin-bottom:24px;animation:fadeIn .4s ease}
.character-wrap{display:inline-block;position:relative;margin-bottom:12px}
.character-wrap svg{filter:drop-shadow(0 4px 12px rgba(0,0,0,.10))}
.type-code{font-size:40px;font-weight:900;letter-spacing:6px;color:var(--tc);margin-bottom:4px}
.type-label{font-size:26px;font-weight:800;color:#1E1E2E;margin-bottom:4px}
.type-tagline{font-size:15px;color:#888;font-weight:500}

.results-card{background:#fff;border-radius:20px;padding:36px;box-shadow:0 2px 16px rgba(0,0,0,.06);margin-bottom:20px;animation:fadeIn .4s ease}
.results-card h3{font-size:15px;color:#6C5CE7;letter-spacing:1px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.profile-text{font-size:15px;color:#444;line-height:2;text-align:justify;margin-bottom:20px}

.key-factors{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
.key-factor{display:flex;align-items:center;gap:10px;padding:14px 16px;background:#F4F2F0;border-radius:12px;font-size:14px;font-weight:600;color:#444}
.key-factor .kf-emoji{font-size:18px}
.summary-banner{background:#F4F0FF;border-radius:14px;padding:20px 24px;margin-top:20px;text-align:center}
.summary-banner p{font-size:15px;font-weight:700;color:#1E1E2E;line-height:1.8}

.dimensions-card{background:#fff;border-radius:20px;padding:36px;box-shadow:0 2px 16px rgba(0,0,0,.06);margin-bottom:20px;animation:fadeIn .5s ease}
.dim-row{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.dim-row:last-child{margin-bottom:0}
.dim-label{font-size:13px;font-weight:700;min-width:52px;text-align:center;padding:6px 10px;border-radius:14px;line-height:1.3}
.dim-label.l{background:#EDE9FE;color:#6C5CE7}
.dim-label.r{background:#FEE;color:#C0392B}
.dim-bar-wrap{flex:1;height:28px;background:#F0EDF6;border-radius:14px;display:flex;overflow:hidden}
.dim-bar-l{height:100%;border-radius:14px 0 0 14px;background:#6C5CE7;transition:width .8s ease;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;min-width:32px}
.dim-bar-r{height:100%;border-radius:0 14px 14px 0;background:#C0392B;transition:width .8s ease;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;min-width:32px}
.dim-verdict{font-size:13px;color:#888;min-width:70px;text-align:center;font-weight:600}

.legend-card{background:#fff;border-radius:20px;padding:36px;box-shadow:0 2px 16px rgba(0,0,0,.06);margin-bottom:20px;animation:fadeIn .6s ease}
.legend-item{margin-bottom:16px;font-size:14px;color:#555;line-height:1.9}
.legend-item:last-child{margin-bottom:0}
.legend-item strong{color:#6C5CE7;font-size:15px}

.btn-wrap{text-align:center;margin-top:28px}
.btn-retake{display:inline-flex;align-items:center;gap:8px;padding:14px 44px;font-size:15px;font-weight:700;color:#6C5CE7;background:#fff;border:2px solid #6C5CE7;border-radius:50px;cursor:pointer;transition:all .2s}
.btn-retake:hover{background:#6C5CE7;color:#fff}

/* ===== 手机端适配 ===== */
@media(max-width:600px){
  body{font-size:15px;min-height:100vh}
  #intro-screen{padding:20px 12px}
  #quiz-screen,#results-screen{padding:12px 8px}

  /* --- 首页 --- */
  .intro-card{padding:32px 16px;border-radius:20px;margin:0}
  .intro-logo{font-size:42px;letter-spacing:6px}
  .intro-subtitle{font-size:11px;letter-spacing:1.5px}
  .intro-divider{margin-bottom:20px}
  .intro-lead{font-size:18px;margin-bottom:6px}
  .intro-explainer{font-size:14px;line-height:1.9;margin-bottom:28px}
  .intro-dim-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
  .intro-dim-item{padding:14px 14px;gap:5px}
  .intro-dim-icon{font-size:22px}
  .intro-dim-name{font-size:13px}
  .intro-dim-range{font-size:11px;line-height:1.5}
  .intro-steps{flex-wrap:wrap;gap:8px;margin-bottom:24px}
  .intro-step{font-size:12px;gap:6px}
  .step-num{width:20px;height:20px;font-size:11px}
  .intro-step-arrow{font-size:14px}
  .intro-meta{flex-wrap:wrap;gap:10px;margin-bottom:28px}
  .intro-meta span{font-size:12px}
  .btn-start{padding:16px 0;font-size:17px;width:100%;max-width:100%;border-radius:16px;letter-spacing:3px}

  /* --- 答题 --- */
  .progress-wrap{margin-bottom:20px}
  .progress-bar{height:6px}
  .progress-text{font-size:13px}
  .progress-dots{display:none}
  .question-card{padding:28px 16px;border-radius:18px}
  .question-dim-chip{font-size:11px;padding:5px 14px;margin-bottom:14px}
  .question-text{font-size:18px;line-height:1.8;margin-bottom:22px}

  .scale-wrap{gap:14px}
  .scale-labels{font-size:12px;color:#777;padding:0;line-height:1.6}
  .scale-labels span{max-width:48%}

  /* 选项卡片 */
  .scale-spectrum{flex-direction:column;gap:8px;padding:0}
  .scale-btn{flex-direction:row;align-items:center;gap:14px;width:100%;padding:14px 16px;border-radius:14px;border:2px solid #E8E6E2;background:#FAFAF9;min-height:52px;transition:all .2s}
  .scale-btn:active{transform:scale(.985)}
  .scale-btn.sel{border-color:#6C5CE7;border-left-width:5px;background:#F5F3FF;padding-left:13px;box-shadow:0 2px 8px rgba(108,92,231,.08)}
  .scale-dot{width:18px;height:18px;border-width:2.5px;flex-shrink:0;transition:all .2s}
  .scale-slabel{font-size:15px;color:#555;font-weight:600;white-space:normal;text-align:left}
  .scale-btn.sel .scale-slabel{color:#5B4BD5;font-weight:700}

  /* --- 导航 --- */
  .back-row{margin-top:22px;flex-wrap:wrap;gap:10px}
  .btn-back{flex:1;justify-content:center;padding:13px 16px;font-size:14px;border-radius:14px;min-width:100px}
  .btn-skip{flex:0;padding:13px 20px;font-size:13px;color:#bbb}

  /* --- 结果页 --- */
  .results-hero{margin-bottom:20px}
  .character-wrap svg{width:120px;height:120px}
  .type-code{font-size:34px;letter-spacing:5px}
  .type-label{font-size:24px}
  .type-tagline{font-size:15px;line-height:1.6}

  .results-card,.dimensions-card,.legend-card{padding:26px 16px;border-radius:18px;margin-bottom:14px}
  .results-card h3,.dimensions-card h3,.legend-card h3{font-size:15px;margin-bottom:14px}
  .profile-text{font-size:15px;line-height:2}
  .summary-banner{padding:18px 20px;border-radius:14px}
  .summary-banner p{font-size:15px;line-height:1.9}

  .key-factors{grid-template-columns:1fr;gap:10px}
  .key-factor{padding:14px 16px;font-size:14px;border-radius:14px;min-height:50px}

  /* 维度条 */
  .dim-row{flex-wrap:wrap;gap:8px;margin-bottom:20px}
  .dim-label{min-width:48px;font-size:12px;padding:6px 10px;border-radius:12px;font-weight:700}
  .dim-bar-wrap{height:30px;border-radius:15px;flex:1;min-width:120px;order:2}
  .dim-bar-l,.dim-bar-r{font-size:12px;min-width:30px}
  .dim-verdict{width:100%;text-align:center;font-size:13px;font-weight:700;color:#6C5CE7;order:3;margin-top:2px}

  .legend-item{margin-bottom:16px;font-size:14px;line-height:1.9}
  .legend-item strong{font-size:15px}

  .btn-retake{padding:16px 0;font-size:16px;width:100%;max-width:100%;border-radius:16px;justify-content:center;letter-spacing:1px}
}

@media(max-width:380px){
  #intro-screen{padding:12px 4px}
  .intro-card{padding:24px 12px;border-radius:16px}
  .intro-logo{font-size:34px;letter-spacing:5px}
  .intro-subtitle{font-size:10px;letter-spacing:1px}
  .intro-lead{font-size:17px}
  .intro-explainer{font-size:13px;margin-bottom:22px}
  .intro-dim-grid{grid-template-columns:1fr 1fr;gap:6px;margin-bottom:22px}
  .intro-dim-item{padding:10px 12px;gap:3px}
  .intro-dim-icon{font-size:18px}
  .intro-dim-name{font-size:12px}
  .intro-dim-range{font-size:10px}
  .intro-steps{flex-direction:column;gap:8px;margin-bottom:20px}
  .intro-step-arrow{display:none}
  .intro-meta{gap:6px;margin-bottom:22px;font-size:11px}
  .btn-start{padding:14px 0;font-size:16px;border-radius:14px}

  .question-card{padding:22px 12px;border-radius:16px}
  .question-text{font-size:16px;line-height:1.7;margin-bottom:18px}
  .scale-labels{font-size:11px}
  .scale-btn{padding:12px 14px;gap:10px;min-height:48px;border-radius:12px}
  .scale-btn.sel{padding-left:11px;border-left-width:4px}
  .scale-slabel{font-size:14px}

  .character-wrap svg{width:100px;height:100px}
  .type-code{font-size:28px;letter-spacing:4px}
  .type-label{font-size:22px}
  .results-card,.dimensions-card,.legend-card{padding:22px 12px}
  .profile-text{font-size:14px}
  .key-factor{padding:12px 14px;font-size:13px}
  .dim-bar-wrap{height:26px;border-radius:13px}
  .btn-retake{padding:14px 0;font-size:15px;border-radius:14px}
}
</style>
</head>
<body>

<!-- ==================== INTRO ==================== -->
<div id="intro-screen">
  <div class="intro-card">
    <div class="intro-accent"></div>
    <div class="intro-logo">UBTI</div>
    <div class="intro-subtitle">University Best-fit Type Indicator</div>
    <div class="intro-divider"></div>
    <p class="intro-lead">大学不在排名，在于和你<span class="hl">同频</span></p>
    <p class="intro-explainer">四个维度 · 四十八道题 · 十六种大学适配类型<br>不是按分数分层，而是<span class="hl">按气质匹配</span></p>

    <div class="intro-dim-grid">
      <div class="intro-dim-item">
        <div class="intro-dim-icon">🎯</div>
        <div class="intro-dim-name">使命取向</div>
        <div class="intro-dim-range">学术探究 ↔ 职业应用</div>
      </div>
      <div class="intro-dim-item">
        <div class="intro-dim-icon">📐</div>
        <div class="intro-dim-name">学科边界</div>
        <div class="intro-dim-range">纵深专精 ↔ 跨界广博</div>
      </div>
      <div class="intro-dim-item">
        <div class="intro-dim-icon">🧠</div>
        <div class="intro-dim-name">认知风格</div>
        <div class="intro-dim-range">抽象思辨 ↔ 具象实操</div>
      </div>
      <div class="intro-dim-item">
        <div class="intro-dim-icon">🏛</div>
        <div class="intro-dim-name">制度偏好</div>
        <div class="intro-dim-range">有序规划 ↔ 自由探索</div>
      </div>
    </div>

    <div class="intro-steps">
      <div class="intro-step"><span class="step-num">1</span>回答 48 道选择题</div>
      <div class="intro-step-arrow">→</div>
      <div class="intro-step"><span class="step-num">2</span>四个维度分析</div>
      <div class="intro-step-arrow">→</div>
      <div class="intro-step"><span class="step-num">3</span>匹配你的大学类型</div>
    </div>

    <div class="intro-meta">
      <span>📋 48 题</span><span>⏱ 约 8 分钟</span><span>🔒 数据留在本地</span>
    </div>
    <button class="btn-start" onclick="startQuiz()">开 始 测 试</button>
  </div>
</div>

<!-- ==================== QUIZ ==================== -->
<div id="quiz-screen">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-text">
      <span id="progress-label">第 1 / 48 题</span>
      <div class="progress-dots" id="progress-dots"></div>
    </div>
  </div>
  <div class="question-card" id="question-card"></div>
</div>

<!-- ==================== RESULTS ==================== -->
<div id="results-screen">
  <div class="results-hero">
    <div class="character-wrap" id="character-wrap"></div>
    <div class="type-code" id="type-code"></div>
    <div class="type-label" id="type-label"></div>
    <div class="type-tagline" id="type-tagline"></div>
  </div>
  <div class="results-card" id="profile-card"></div>
  <div class="results-card" id="factors-card"></div>
  <div class="dimensions-card" id="dimensions-card"></div>
  <div class="legend-card" id="legend-card"></div>
  <div class="btn-wrap">
    <button class="btn-retake" onclick="retakeTest()">🔄 重新测试</button>
  </div>
</div>

<script>
// ╔══════════════════════════════════════════════════════╗
// ║  卡通角色 SVG 生成器                                 ║
// ╚══════════════════════════════════════════════════════╝
function makeCharacter(opt){
  const bc=opt.bodyColor,bcl=opt.bodyColorLight||bc,sk=opt.skin||'#FFDBB5';
  const hc=opt.hairColor||'#3D2B1F',ht=opt.hairType||'short';
  const acc=opt.accessory||'none',expr=opt.expression||'smile';

  function hairPath(){
    const m={
      'short':'<path d="M35 44 Q35 24 52 24 L56 22 Q58 18 64 18 Q70 18 72 22 L76 24 L93 24 Q110 24 110 44 Q110 50 106 48 Q102 44 100 46 Q96 50 90 44 L86 38 Q82 34 76 34 L70 30 Q66 26 64 26 Q62 26 58 30 L52 34 Q46 34 42 38 L38 44 Q32 50 28 46 Q24 44 20 48 Q16 50 16 44 Z" fill="'+hc+'"/>',
      'bob':'<path d="M34 46 Q34 22 50 22 L58 18 Q62 14 68 14 Q74 14 78 18 L86 22 Q102 22 102 46 Q102 54 98 56 L96 50 Q94 44 88 46 L82 52 Q78 58 72 60 Q68 62 64 60 Q58 56 54 52 L48 46 Q42 44 38 50 L36 56 Q34 54 34 46 Z" fill="'+hc+'"/>',
      'long':'<path d="M34 44 Q34 20 50 20 L56 16 Q62 10 70 10 Q78 10 84 16 L90 20 Q106 20 106 44 Q106 50 104 52 L100 68 Q98 78 92 82 Q86 86 78 82 L72 74 Q68 68 64 66 L70 50 Q74 42 78 44 L82 48 Q86 50 90 46 L94 44 Q98 44 98 46 Q98 50 94 50 L90 54 L88 64 Q86 74 80 78 Q74 80 68 76 L62 68 Q58 60 56 56 L50 50 Q46 44 42 44 L38 48 Q34 50 30 48 Q26 46 26 42 Q26 34 34 44 Z" fill="'+hc+'"/>',
      'curly':'<path d="M34 44 Q32 18 50 22 Q56 8 64 14 Q72 8 78 16 Q86 10 90 18 Q96 14 100 22 Q108 24 106 36 Q110 44 104 48 Q98 52 94 46 Q90 38 86 44 Q82 50 78 44 Q74 38 70 44 Q66 50 62 44 Q58 38 54 44 Q50 50 46 46 Q40 52 34 48 Z" fill="'+hc+'"/>',
      'spiky':'<path d="M34 46 Q36 24 50 22 L54 12 Q56 4 62 8 Q68 4 72 10 L78 6 Q82 12 86 16 L92 18 Q102 14 104 28 Q110 36 106 44 Q100 52 96 46 Q90 52 84 46 Q78 52 72 46 Q66 50 60 44 Q54 50 48 46 Q40 52 34 46 Z" fill="'+hc+'"/>',
    };
    return m[ht]||m['short'];
  }

    descA:"你的知识偏好是不断加深而非不断扩展。你享受在一个领域里越挖越深的过程，相信真正的竞争力来自不可替代的深度。专注一个方向做到极致，让你感到踏实和充实。",
    descB:"你的知识偏好是广泛连接而非单点深钻。你对多个领域保持开放和好奇，相信最有价值的东西往往出现在学科交叉处。跨领域思考对你来说不是分心，而是养分。"
  },
  T:{name:"认知风格",chipA:"A",chipB:"C",labelA:"抽象思辨",labelB:"具象实操",
    descA:"你处理知识的方式偏向概念推理和逻辑推演。你享受在头脑中构建理论框架，喜欢追问「为什么」。论述、分析、思辨——这些是你的舒适区，也是你最能发挥所长的地方。",

    descA:"你对大学环境的需求偏向清晰的结构和明确的路径。有体系的课程、明确的评价标准、可预期的进度——这些让你安心，也让你高效。你在有序的框架内最能发挥自己的潜力。",
    descB:"你对大学环境的需求偏向弹性和自主空间。你需要选课的自由、探索的余地、不被过度规划的权利。在开放的环境中，你最能找到自己的节奏和方向。"

// ╔══════════════════════════════════════════════════════╗
// ║  计分：从 choices 数组计算各维度得分                  ║
// ╚══════════════════════════════════════════════════════╝
function calcScores(){
  const s={U:{A:0,B:0},B:{A:0,B:0},T:{A:0,B:0},I:{A:0,B:0}};
  for(let i=0;i<shuffled.length;i++){
    const c=choices[i];
    if(c===null||c===undefined) continue;
    const q=shuffled[i];
    const dim=q.dim;
    // 根据题目是否被翻转，调整计分方向
    const toA=q.flipped?"B":"A";
    const toB=q.flipped?"A":"B";
    if(c===0){s[dim][toA]+=2}
    else if(c===1){s[dim][toA]+=1}
    else if(c===3){s[dim][toB]+=1}
    else if(c===4){s[dim][toB]+=2}
  }
  return s;
}

function calcCode(scores){
  const u=scores.U.A>=scores.U.B?"R":"V";
  const b=scores.B.A>=scores.B.B?"D":"W";
  const t=scores.T.A>=scores.T.B?"A":"C";
  const i=scores.I.A>=scores.I.B?"S":"F";
  return u+"-"+b+"-"+t+"-"+i;
}

function showScreen(id){
  ["intro-screen","quiz-screen","results-screen"].forEach(s=>{
    document.getElementById(s).style.display=s===id?"block":"none";
  });
}

// ╔══════════════════════════════════════════════════════╗
// ║  测试流程                                           ║
// ╚══════════════════════════════════════════════════════╝
function startQuiz(){
  currentQ=0;
  // 随机打乱题目顺序，并随机翻转每道题的 AB 左右位置
  shuffled=shuffleArr(QUESTIONS).map(q=>({...q,flipped:Math.random()>.5}));
  choices=new Array(shuffled.length).fill(null);
  const dots=document.getElementById("progress-dots");
  dots.innerHTML=Array.from({length:shuffled.length},()=>'<span></span>').join('');
  showScreen("quiz-screen");
  renderQ();
  window.scrollTo({top:0,behavior:"smooth"});
}

function renderQ(){
  const q=shuffled[currentQ];
  const card=document.getElementById("question-card");
  const fill=document.getElementById("progress-fill");
  const label=document.getElementById("progress-label");
  const pct=Math.round((currentQ/shuffled.length)*100);
  fill.style.width=pct+"%";
  label.textContent=`第 ${currentQ+1} / ${shuffled.length} 题`;

  const dots=document.querySelectorAll("#progress-dots span");
  dots.forEach((d,i)=>{if(choices[i]!==null)d.classList.add("done")});

  card.style.animation="none";card.offsetHeight;card.style.animation="fadeIn .3s ease";
  const dm=dimMeta[q.dim];
  const prev=choices[currentQ];

  // 根据是否翻转来交换左右标签
  const leftOpt=q.flipped?q.optB:q.optA;
  const rightOpt=q.flipped?q.optA:q.optB;

  card.innerHTML=`
    <div class="question-dim-chip chip-${q.dim}">${dm.name}</div>
    <div class="question-text">${q.text}</div>
    <div class="scale-wrap">
      <div class="scale-labels">
        <span>${leftOpt}</span>
        <span>${rightOpt}</span>
      </div>
      <div class="scale-spectrum">
        <button class="scale-btn${prev===0?' sel':''}" onclick="answer(0)" title="非常认同左侧描述">
          <span class="scale-dot"></span><span class="scale-slabel">非常认同左侧</span>
        </button>
        <button class="scale-btn${prev===1?' sel':''}" onclick="answer(1)" title="比较认同左侧描述">
          <span class="scale-dot"></span><span class="scale-slabel">比较认同左侧</span>
        </button>
        <button class="scale-btn${prev===2?' sel':''}" onclick="answer(2)" title="中立">
          <span class="scale-dot"></span><span class="scale-slabel">中立</span>
        </button>
        <button class="scale-btn${prev===3?' sel':''}" onclick="answer(3)" title="比较认同右侧描述">
          <span class="scale-dot"></span><span class="scale-slabel">比较认同右侧</span>
        </button>
        <button class="scale-btn${prev===4?' sel':''}" onclick="answer(4)" title="非常认同右侧描述">
          <span class="scale-dot"></span><span class="scale-slabel">非常认同右侧</span>
        </button>
      </div>
    </div>
    <div class="back-row">
      <button class="btn-back" onclick="goBack()"${currentQ===0?' disabled':''}>← 上一题</button>
      <button class="btn-skip" onclick="skipQ()">跳过 ⏭</button>
    </div>
  `;
}

function answer(choice){
  choices[currentQ]=choice;
  currentQ++;
  if(currentQ<shuffled.length){renderQ()}else{showResults()}
}

function goBack(){
  if(currentQ>0){
    currentQ--;
    renderQ();
  }
}

function skipQ(){
  // 标记为中立 (choice=2)
  if(choices[currentQ]===null) choices[currentQ]=2;
  currentQ++;
  if(currentQ<shuffled.length){renderQ()}else{showResults()}
}

// ╔══════════════════════════════════════════════════════╗
// ║  结果展示                                           ║
// ╚══════════════════════════════════════════════════════╝
function showResults(){
  showScreen("results-screen");
  const scores=calcScores();
  const code=calcCode(scores);
  const type=TYPE_CONFIG[code];
  const cc=type.character;

  document.documentElement.style.setProperty('--tc',cc.bodyColor);
  document.documentElement.style.setProperty('--tcl',cc.bodyColorLight);

  // 角色
  document.getElementById("character-wrap").innerHTML=makeCharacter(cc);
  document.getElementById("type-code").textContent=code;
  document.getElementById("type-label").textContent=type.label;
  document.getElementById("type-tagline").textContent=type.tagline;

  // 画像 + 择校要素 + 总结
  document.getElementById("profile-card").innerHTML=`
    <h3>📖 适配画像</h3>
    <div class="profile-text">${type.profile}</div>
    <div class="summary-banner"><p>✨ ${type.summary}</p></div>
  `;
  document.getElementById("factors-card").innerHTML=`
    <h3>🎯 你在择校时最该关注的</h3>
    <div class="key-factors">
      ${type.factors.map((f,i)=>`<div class="key-factor"><span class="kf-emoji">${['🔬','📚','🏛','🤝'][i]}</span>${f}</div>`).join('')}
    </div>
  `;

  // 维度分解
  const dimOrder=["U","B","T","I"];
  let dimsHTML='<h3>📊 你的四个维度倾向</h3>';
  dimOrder.forEach(dim=>{
    const a=scores[dim].A,b=scores[dim].B,tot=a+b;
    const pA=tot?Math.round(a/tot*100):50,pB=100-pA;
    const dm=dimMeta[dim];
    const verdict=pA>=55?`偏 ${dm.labelA}`:(pB>=55?`偏 ${dm.labelB}`:"倾向平衡");
    dimsHTML+=`
    <div class="dim-row">
      <div class="dim-label l">${dm.labelA}</div>
      <div class="dim-bar-wrap">
        <div class="dim-bar-l" style="width:${pA}%">${pA>=18?a:''}</div>
        <div class="dim-bar-r" style="width:${pB}%">${pB>=18?b:''}</div>
      </div>
      <div class="dim-label r">${dm.labelB}</div>
      <div class="dim-verdict">${verdict}</div>
    </div>`;
  });
  document.getElementById("dimensions-card").innerHTML=dimsHTML;

  // 字母含义
  const parts=code.split("-");
  let legHTML='<h3>🔑 你的四个字母代表什么</h3>';
  dimOrder.forEach((dim,i)=>{
    const dm=dimMeta[dim];
    const yourP=parts[i];
    const yourLabel=yourP===dm.chipA?dm.labelA:dm.labelB;
    const yourDesc=yourP===dm.chipA?dm.descA:dm.descB;
    legHTML+=`<div class="legend-item"><strong>${dm.name} → ${yourP} · ${yourLabel}</strong><br>${yourDesc}</div>`;
  });
  document.getElementById("legend-card").innerHTML=legHTML;

  window.scrollTo({top:0,behavior:"smooth"});
}

function retakeTest(){
  showScreen("intro-screen");
  window.scrollTo({top:0,behavior:"smooth"});
}
</script>
